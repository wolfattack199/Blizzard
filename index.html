<body>
  <!-- Boot screen -->
  <div id="boot" class="boot boot-run">
    <div class="boot-logo" aria-label="Blizzard is starting">
      <div class="boot-mark" aria-hidden="true">
        <span class="boot-tile boot-tile-1"></span>
        <span class="boot-tile boot-tile-2"></span>
        <span class="boot-tile boot-tile-3"></span>
        <span class="boot-tile boot-tile-4"></span>
      </div>
      <div class="boot-title">Blizzard</div>
    </div>
    <div class="boot-status" id="boot-status">Checking your session...</div>
  </div>

  <!-- Auth screen -->
  <div id="auth" class="auth hidden">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-flake"></div>
        <div class="auth-brand-text">Blizzard</div>
      </div>

      <!-- Returning-user view: shows the last signed-in profile -->
      <div id="auth-remembered" class="auth-remembered hidden">
        <div id="auth-remembered-avatar" class="auth-remembered-avatar"></div>
        <div id="auth-remembered-name" class="auth-remembered-name"></div>
        <div class="auth-remembered-sub">Please sign in to your account</div>
        <form id="auth-remembered-form" class="auth-form" autocomplete="off" style="margin-top:14px">
          <input id="auth-remembered-username" class="visually-hidden" type="text" autocomplete="username" tabindex="-1" aria-hidden="true" />
          <label class="auth-field">
            <span>Password</span>
            <input id="auth-remembered-password" type="password" minlength="6" autocomplete="current-password" required autofocus />
          </label>
          <div id="auth-remembered-error" class="auth-error"></div>
          <button type="submit" class="auth-submit">Sign in</button>
        </form>
        <button type="button" id="auth-switch-account" class="auth-switch">Use a different account</button>
      </div>

      <!-- Full sign-in / sign-up view -->
      <div id="auth-full">
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-mode="login">Sign in</button>
          <button type="button" class="auth-tab" data-mode="signup">Create account</button>
        </div>
        <form id="auth-form" class="auth-form" autocomplete="off">
          <label class="auth-field">
            <span>Username</span>
            <input id="auth-username" type="text" maxlength="20" pattern="[a-zA-Z0-9_]{3,20}" autocomplete="username" spellcheck="false" required />
          </label>
          <label class="auth-field">
            <span>Password</span>
            <input id="auth-password" type="password" minlength="6" autocomplete="current-password" required />
          </label>
          <label id="auth-confirm-wrap" class="auth-field hidden">
            <span>Confirm password</span>
            <input id="auth-confirm-password" type="password" minlength="6" autocomplete="new-password" />
          </label>
          <div id="auth-error" class="auth-error"></div>
          <button type="submit" id="auth-submit" class="auth-submit">Sign in</button>
        </form>
        <div class="auth-hint">Usernames are 3–20 chars, letters/numbers/underscores. Passwords are 6+ chars.</div>
      </div>
    </div>
  </div>

  <!-- Desktop (loaded after login) -->
  <div id="desktop" class="desktop hidden">
    <div id="desktop-surface" class="desktop-surface"></div>
    <div id="windows" class="windows-layer"></div>
    <div id="taskbar" class="taskbar">
      <button id="start-btn" class="start-btn" aria-label="Start menu" title="Start (Alt+A)">
        <span class="start-flake"></span>
      </button>
      <div id="taskbar-search" class="taskbar-search">
        <input id="search-input" type="text" placeholder="Search apps and Blizzard…" />
      </div>
      <div id="taskbar-apps" class="taskbar-apps"></div>
      <div class="taskbar-tray">
        <span id="tray-user" class="tray-user"></span>
        <span id="tray-clock" class="tray-clock"></span>
      </div>
    </div>
    <div id="start-menu" class="start-menu hidden">
      <div class="start-header">
        <div class="start-avatar" id="start-avatar"></div>
        <div>
          <div class="start-username" id="start-username"></div>
          <div class="start-storage" id="start-storage"></div>
          <button class="start-signout" id="start-signout">Sign out</button>
        </div>
      </div>
      <div class="start-search">
        <input id="start-search-input" type="text" placeholder="Type to search apps…" />
      </div>
      <div class="start-apps" id="start-apps"></div>
    </div>
    <div id="context-menu" class="context-menu hidden"></div>
    <div id="calendar" class="calendar hidden"></div>
  </div>

  <!-- Templates -->
  <template id="tpl-window">
    <div class="window" tabindex="-1">
      <div class="window-titlebar">
        <div class="window-icon"></div>
        <div class="window-title"></div>
        <div class="window-actions">
          <button class="win-btn win-min" title="Minimize">–</button>
          <button class="win-btn win-max" title="Maximize">▢</button>
          <button class="win-btn win-close" title="Close">×</button>
        </div>
      </div>
      <div class="window-body"></div>
      <div class="window-resize"></div>
    </div>
  </template>

      const offlineText = "No internet connection. Reconnect and Blizzard will keep trying...";
      const slowText = location.protocol === "file:"

        showBootMessage(offlineText);

          ? "Blizzard opened locally, but a required script could not load. Check internet/Firebase access and refresh."

        showBootMessage(message);

      window.addEventListener("offline", showOffline);
      window.addEventListener("online", () => {
        if (!appIsWaiting()) return;
        if (status()) status().textContent = "Internet reconnected. Restarting Blizzard...";

    throw new Error(`File too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Limit is ${CLOUD_MAX_BYTES / 1024 / 1024} MB.`);
  }
  const id = push(ref(db, `cloud-files/${uid}`)).key;
  const path = parentPath.replace(/\/$/, "") + "/" + file.name;
  await trackUpload(uid, file.size, "cloud");
  try {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    await set(ref(db, `cloud-files/${uid}/${id}`), {
      id,
      path,
      parent: parentPath.replace(/\/$/, ""),
      name: file.name,
      size: file.size,
      type: file.type || "application/octet-stream",
      uploadedAt: Date.now(),
      ownerUid: uid,
      sharedWith: {}
    });
    await set(ref(db, `cloud-blobs/${uid}/${id}`), dataUrl);
  } catch (err) {
    await trackDelete(uid, file.size, "cloud").catch(() => {
    });
    await remove(ref(db, `cloud-files/${uid}/${id}`)).catch(() => {
    });
    await remove(ref(db, `cloud-blobs/${uid}/${id}`)).catch(() => {
    });
    throw err;
  }
  await bumpAchievement(uid, "cloud_files_uploaded");
  return id;
}
async function cloudWriteText(uid, path, content) {
  const bytes = new Blob([content]).size;
  if (bytes > CLOUD_MAX_BYTES) throw new Error(`File too large.`);
  const id = push(ref(db, `cloud-files/${uid}`)).key;
  const parts = path.split("/");
  const name = parts.pop();
  const parent = parts.join("/") || "/";
  const dataUrl = "data:text/plain;base64," + btoa(unescape(encodeURIComponent(content || "")));
  await trackUpload(uid, bytes, "cloud");
  try {
    await set(ref(db, `cloud-files/${uid}/${id}`), {
      id,
      path,
      parent,
      name,
      size: bytes,
      type: "text/plain",
      uploadedAt: Date.now(),
      ownerUid: uid,
      sharedWith: {}
    });
    await set(ref(db, `cloud-blobs/${uid}/${id}`), dataUrl);
  } catch (err) {
    await trackDelete(uid, bytes, "cloud").catch(() => {
    });
    await remove(ref(db, `cloud-files/${uid}/${id}`)).catch(() => {
    });
    await remove(ref(db, `cloud-blobs/${uid}/${id}`)).catch(() => {
    });
    throw err;
  }
  await bumpAchievement(uid, "cloud_files_uploaded");
  return id;
}

async function cloudDeleteFolder(uid, folderPath) {
  const folders = await get(ref(db, `cloud-folders/${uid}`));
  const matches = [];
  folders.forEach((c) => {
    const v = c.val();
    if (v.path === folderPath || v.path.startsWith(folderPath + "/")) matches.push(c.key);
  });
  for (const k of matches) await remove(ref(db, `cloud-folders/${uid}/${k}`));
  const files = await get(ref(db, `cloud-files/${uid}`));
  const fids = [];
  files.forEach((c) => {
    const v = c.val();
    if (v.parent === folderPath || (v.parent || "").startsWith(folderPath + "/")) fids.push(c.key);
  });
  for (const fid of fids) await cloudDeleteFile(uid, fid);
}
async function cloudRenameFile(uid, fid, newName) {
  const snap = await get(ref(db, `cloud-files/${uid}/${fid}`));
  const f = snap.val();
  if (!f) return;
  const newPath = (f.parent === "/" ? "" : f.parent) + "/" + newName;
  await update(ref(db, `cloud-files/${uid}/${fid}`), { name: newName, path: newPath });
  if (f.sharedWith) {
    for (const rcpt of Object.keys(f.sharedWith)) {
      await update(ref(db, `cloud-shares/${rcpt}/${uid}__${fid}`), { name: newName });
    }
  }
}
async function cloudRenameFolder(uid, oldOwnPath, newOwnPath) {
  if (!oldOwnPath || oldOwnPath === "/") throw new Error("Can't rename root.");
  const files = await get(ref(db, `cloud-files/${uid}`));
  const updatesFile = {};
  files.forEach((c) => {
    const v = c.val();
    if (!v?.path) return;
    if (v.path === oldOwnPath || v.path.startsWith(oldOwnPath + "/")) {
      const np = newOwnPath + v.path.slice(oldOwnPath.length);
      const parts = np.split("/");
      const name = parts.pop();
      const parent = parts.join("/") || "/";
      updatesFile[`cloud-files/${uid}/${c.key}/path`] = np;
      updatesFile[`cloud-files/${uid}/${c.key}/parent`] = parent;
      updatesFile[`cloud-files/${uid}/${c.key}/name`] = name;
    }
  });
  const folders = await get(ref(db, `cloud-folders/${uid}`));
  folders.forEach((c) => {
    const v = c.val();
    if (!v?.path) return;
    if (v.path === oldOwnPath || v.path.startsWith(oldOwnPath + "/")) {
      const np = newOwnPath + v.path.slice(oldOwnPath.length);
      updatesFile[`cloud-folders/${uid}/${c.key}/path`] = np;
    }
  });
  if (Object.keys(updatesFile).length > 0) {
    await update(ref(db), updatesFile);
  }
}
async function cloudShareFile(ownerUid, ownerUsername, fid, recipientUsername) {

  const file = fileSnap.val();
  if (!file) throw new Error("File not found.");
  await update(ref(db, `cloud-files/${ownerUid}/${fid}/sharedWith`), { [recipientUid]: true });
  await set(ref(db, `cloud-shares/${recipientUid}/${ownerUid}__${fid}`), {
    ownerUid,
    ownerUsername,
    fid,
    name: file.name,
    size: file.size,
    type: file.type,
    sharedAt: Date.now()
  });

}

function serializeIconPositions(positions = {}) {
  const out = {};
  for (const [id, pos] of Object.entries(positions || {})) {
    const safeId2 = encodeKey(id);
    const x = Number.isFinite(pos?.x) ? Math.round(pos.x) : 0;
    const y = Number.isFinite(pos?.y) ? Math.round(pos.y) : 0;
    out[safeId2] = { id, x, y, updatedAt: Date.now() };
  }
  return out;
}
function normalizeIconPositions(raw = {}) {
  const out = {};
  for (const [key, pos] of Object.entries(raw || {})) {
    const id = pos?.id || key;
    if (!id) continue;
    const x = Number(pos?.x);
    const y = Number(pos?.y);
    if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
    out[id] = { x, y };
  }
  return out;
}

async function adminBulkDeleteUserMessages(adminUid, targetUid, reason = "") {
  let deleted = 0;
  const walk = async (path) => {
    const snap = await get(ref(db, path));
    const removes = [];
    snap.forEach((c) => {
      const v = c.val();
      if (v && v.uid === targetUid) removes.push(remove(ref(db, `${path}/${c.key}`)));
    });
    deleted += removes.length;
    await Promise.all(removes);
  };
  const channelsSnap = await get(ref(db, "messages/channels"));
  for (const cid of Object.keys(channelsSnap.val() || {})) {
    await walk(`messages/channels/${cid}`);
  }
  const dmsSnap = await get(ref(db, "messages/dms"));
  for (const pair of Object.keys(dmsSnap.val() || {})) {
    await walk(`messages/dms/${pair}`);
  }
  const serversSnap = await get(ref(db, "serverMessages"));
  for (const sid of Object.keys(serversSnap.val() || {})) {
    const channels = await get(ref(db, `serverMessages/${sid}`));
    for (const cid of Object.keys(channels.val() || {})) {
      await walk(`serverMessages/${sid}/${cid}`);
    }
  }
  const tubeSnap = await get(ref(db, "tubeComments"));
  for (const vid of Object.keys(tubeSnap.val() || {})) {
    await walk(`tubeComments/${vid}`);
  }
  const streamChatSnap = await get(ref(db, "stream-chat"));
  for (const sid of Object.keys(streamChatSnap.val() || {})) {
    await walk(`stream-chat/${sid}`);
  }
  await push(ref(db, "admin_audit_log"), {
    action: "bulk-delete-messages",
    adminUid,
    targetUid,
    reason,
    deleted,
    ts: Date.now()
  }).catch(() => {
  });
  return deleted;
}

async function publishTune(ownerUid, ownerUsername, file, meta) {
  const mime = inferAudioMime(file);
  if (!mime) {
    throw new Error("Unsupported audio type. Use .mp3, .wav, .flac, .ogg, or .m4a.");
  }
  if (file.size > TUNE_MAX_BYTES) {
    throw new Error(`Track too large (${(file.size / 1024 / 1024).toFixed(1)} MB). Limit is ${TUNE_MAX_BYTES / 1024 / 1024} MB.`);
  }
  const id = push(ref(db, `tunes`)).key;
  await trackUpload(ownerUid, file.size, "tunes");
  try {
    let dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    dataUrl = normalizeDataUrlMime(dataUrl, mime);
    if (dataUrl.length > 9.5 * 1024 * 1024) {
      throw new Error("Track is too large after browser encoding. Try a shorter or more compressed file.");
    }
    await set(ref(db, `tunes/${id}`), {
      id,
      ownerUid,
      ownerUsername,
      title: meta.title || file.name,
      artist: meta.artist || ownerUsername,
      kind: meta.kind || "music",
      // "music" | "podcast"
      cover: meta.cover || "",
      size: file.size,
      mime,
      plays: 0,
      likes: 0,
      createdAt: Date.now()
    });
    await set(ref(db, `tune-blobs/${id}`), dataUrl);
  } catch (err) {
    await trackDelete(ownerUid, file.size, "tunes").catch(() => {
    });
    await remove(ref(db, `tunes/${id}`)).catch(() => {
    });
    await remove(ref(db, `tune-blobs/${id}`)).catch(() => {
    });
    throw err;
  }
  await bumpAchievement(ownerUid, "tunes_uploaded");
  return id;
}

function inferAudioMime(file) {
  const name = (file?.name || "").toLowerCase();
  if (file?.type?.startsWith("audio/")) return file.type;
  if (name.endsWith(".mp3")) return "audio/mpeg";
  if (name.endsWith(".wav")) return "audio/wav";
  if (name.endsWith(".flac")) return "audio/flac";
  if (name.endsWith(".ogg")) return "audio/ogg";
  if (name.endsWith(".m4a")) return "audio/mp4";
  return "";
}

function thumbHtml(t) {
  if (t.thumb && t.thumb.startsWith("data:")) {
    return `<img src="${escapeHtml(t.thumb)}" alt="" loading="lazy">`;
  }
  const yt = parseYouTube(t.url || "");
  if (yt) return `<img src="https://img.youtube.com/vi/${escapeHtml(yt)}/mqdefault.jpg" alt="" loading="lazy">`;
  return "\u{1F3AC}";
}
function renderLegacyPlayer(v) {
  const yt = parseYouTube(v.url || "");
  if (yt) return `<iframe src="https://www.youtube.com/embed/${escapeHtml(yt)}" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;
  if (/\.(mp4|webm|ogg|mov)(\?|$)/i.test(v.url || "")) {
    return `<video src="${escapeHtml(v.url)}" controls playsinline preload="metadata"></video>`;
  }
  const vimeo = (v.url || "").match(/vimeo\.com\/(\d+)/);
  if (vimeo) return `<iframe src="https://player.vimeo.com/video/${escapeHtml(vimeo[1])}" allowfullscreen></iframe>`;
  return `<iframe src="${escapeHtml(v.url || "")}" allowfullscreen></iframe>`;
}
function parseYouTube(url) {
  const m = (url || "").match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function isAcceptedVideo(file) {
  const name = (file?.name || "").toLowerCase();

}

function serializeSessionDescription(desc) {
  if (!desc) return null;
  if (typeof desc.toJSON === "function") return desc.toJSON();
  return { type: desc.type, sdp: desc.sdp };
}
function serializeIceCandidate(candidate) {
  if (!candidate) return null;
  if (typeof candidate.toJSON === "function") return candidate.toJSON();
  const out = {
    candidate: candidate.candidate,
    sdpMid: candidate.sdpMid,
    sdpMLineIndex: candidate.sdpMLineIndex
  };
  if (candidate.usernameFragment != null) out.usernameFragment = candidate.usernameFragment;
  return out;
}
function normalizeSessionDescription(desc) {
  return { type: desc?.type, sdp: desc?.sdp };
}
function normalizeIceCandidate(candidate) {
  return {
    candidate: candidate?.candidate,
    sdpMid: candidate?.sdpMid ?? null,
    sdpMLineIndex: candidate?.sdpMLineIndex ?? null,
    usernameFragment: candidate?.usernameFragment
  };
}

async function renderTunes(host, ctx) {
  host.innerHTML = `
    <div class="tunes">

  const listEl = host.querySelector('[data-bind="list"]');

  const npTitle = host.querySelector('[data-bind="np-title"]');

  const status = host.querySelector('[data-bind="status"]');
  const fileInput = host.querySelector('[data-bind="file"]');
  let view = "discover";
  let allTunes = [];
  let playlists = [];
  const navItems = host.querySelectorAll(".tunes-nav-item");
  navItems.forEach((el2) => el2.addEventListener("click", () => {
    navItems.forEach((x) => x.classList.toggle("active", x === el2));
    view = el2.dataset.view;
    render();
  }));
  const unsub = subscribeTunes((list2) => {
    allTunes = list2;
    render();
  });
  async function reloadPlaylists() {
    playlists = await listPlaylists(ctx.user.uid);
    if (view === "playlists") render();
  }
  reloadPlaylists();
  function filteredTracks() {
    const q = (searchEl.value || "").toLowerCase();
    let list2 = allTunes;
    if (view === "library") list2 = list2.filter((t) => t.ownerUid === ctx.user.uid);
    else if (view === "music") list2 = list2.filter((t) => t.kind !== "podcast");
    else if (view === "podcasts") list2 = list2.filter((t) => t.kind === "podcast");
    if (q) list2 = list2.filter((t) => (t.title || "").toLowerCase().includes(q) || (t.artist || "").toLowerCase().includes(q) || (t.ownerUsername || "").toLowerCase().includes(q));

        <div class="tunes-meta">
          <div class="tunes-title">${escapeHtml(t.title || "Untitled")}</div>
          <div class="tunes-sub">${escapeHtml(t.artist || "")} \xB7 @${escapeHtml(t.ownerUsername || "anon")} \xB7 ${t.plays || 0} play${t.plays === 1 ? "" : "s"}</div>
        </div>
        <div class="tunes-actions">
          <button class="primary" data-act="play">\u25B6</button>

      row.querySelector('[data-act="open"]').onclick = () => openPlaylist(p);
      row.querySelector('[data-act="del"]').onclick = async () => {
        if (!confirm(`Delete playlist "${p.name}"?`)) return;
        await deletePlaylist(ctx.user.uid, p.id);
        reloadPlaylists();
      };
    });
  }
  function openPlaylist(p) {
    const ids = p.trackIds || [];
    const items = ids.map((id) => allTunes.find((t) => t.id === id)).filter(Boolean);
    if (items.length === 0) {
      listEl.innerHTML = `<div style="padding:30px;text-align:center" class="muted">Playlist is empty. Pick tracks from Discover and add via the menu.</div>
        <button data-act="back" style="margin-left:30px">\u2190 Back to playlists</button>`;
      listEl.querySelector('[data-act="back"]').onclick = () => render();
      return;
    }
    listEl.innerHTML = `
      <button data-act="back" style="margin:10px 0 14px">\u2190 Back to playlists</button>
      <h3 style="margin:0 0 12px">${escapeHtml(p.name)}</h3>
    ` + items.map((t) => `
      <div class="tunes-row" data-id="${escapeHtml(t.id)}">
        <div class="tunes-cover">\u{1F3B5}</div>
        <div class="tunes-meta">
          <div class="tunes-title">${escapeHtml(t.title)}</div>
          <div class="tunes-sub">${escapeHtml(t.artist || "")} \xB7 @${escapeHtml(t.ownerUsername || "anon")}</div>
        </div>
        <div class="tunes-actions">
          <button class="primary" data-act="play">\u25B6</button>
        </div>
      </div>
    `).join("");
    listEl.querySelector('[data-act="back"]').onclick = () => render();
    listEl.querySelectorAll(".tunes-row").forEach((row) => {

    });
  }
  async function play(t) {
    status.textContent = "Loading\u2026";
    const blob = await getTuneBlob(t.id);

    if (!blob) {

      return;
    }
    audio.src = blob;
    audio.play().catch(() => {
    });
    npTitle.textContent = t.title || "Untitled";
    npArtist.textContent = t.artist || "@" + (t.ownerUsername || "");
    npCover.innerHTML = t.cover ? `<img src="${escapeHtml(t.cover)}" alt="">` : t.kind === "podcast" ? "\u{1F399}" : "\u{1F3B5}";
    incrementTunePlays(t.id);
  }
  searchEl.addEventListener("input", render);
  host.querySelector('[data-act="upload"]').onclick = () => fileInput.click();
  fileInput.addEventListener("change", async () => {
    for (const f of fileInput.files) {
      if (!isAcceptedAudio(f)) {
        alert(`"${f.name}" is not a supported audio file. Use ${TUNE_ACCEPTED_EXTS.join(", ")}.`);
        continue;
      }
      if (f.size > TUNE_MAX_BYTES) {
        alert(`"${f.name}" is too large (${(f.size / 1024 / 1024).toFixed(1)} MB). Limit is ${TUNE_MAX_BYTES / 1024 / 1024} MB.`);
        continue;
      }
      const title = prompt(`Title for "${f.name}"?`, f.name.replace(/\.[^.]+$/, ""));
      if (title === null) continue;

        status.textContent = "Uploaded \u2713";

        alert(`Upload failed: ${e.message}`);
      }
    }
    fileInput.value = "";
    status.textContent = "";
  });
  host.querySelector('[data-act="newpl"]').onclick = async () => {
    const name = prompt("Playlist name?");
    if (!name) return;
    await createPlaylist(ctx.user.uid, name);
    await reloadPlaylists();
    view = "playlists";
    navItems.forEach((x) => x.classList.toggle("active", x.dataset.view === "playlists"));
    render();
  };
  return () => unsub();
}
function isAcceptedAudio(file) {
  const name = (file?.name || "").toLowerCase();
  return file?.type?.startsWith("audio/") || TUNE_ACCEPTED_EXTS.some((ext) => name.endsWith(ext));
}

async function mountTerminal(root, ctx) {
  root.innerHTML = `
    <div class="app">
      <div class="terminal">
        <div class="terminal-output" data-bind="out"></div>
        <div class="terminal-input-line">
          <span class="terminal-prompt" data-bind="prompt"></span>
          <input class="terminal-input" data-bind="in" autocapitalize="off" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </div>
  `;
  const out = root.querySelector('[data-bind="out"]');
  const inp = root.querySelector('[data-bind="in"]');
  const prom = root.querySelector('[data-bind="prompt"]');
  let cwd = "/";
  const history = [];
  let hIdx = -1;
  function setPrompt() {
    prom.textContent = `${ctx.user.username}@blizzard:${cwd}$`;
  }
  function print(text, cls = "") {
    const line = document.createElement("div");
    line.className = "terminal-line" + (cls ? " " + cls : "");
    line.textContent = text;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
    root.querySelector(".terminal").scrollTop = root.querySelector(".terminal").scrollHeight;
  }
  function ok(t) {
    print(t, "ok");
  }
  function err(t) {
    print(t, "err");
  }
  function dim(t) {
    print(t, "dim");
  }
  function warn(t) {
    print(t, "warn");
  }
  function abs(path) {
    if (!path) return cwd;
    if (path.startsWith("/")) return normalize(path);
    if (path === "~") return "/";
    if (path === "..") {
      const parts = cwd.split("/").filter(Boolean);
      parts.pop();
      return "/" + parts.join("/");
    }
    return normalize(cwd === "/" ? "/" + path : cwd + "/" + path);
  }
  print("Blizzard OS Terminal \u2014 type 'help' for commands.", "dim");
  print("");
  setPrompt();
  inp.focus();
  root.querySelector(".terminal").addEventListener("click", () => inp.focus());
  inp.addEventListener("keydown", async (e) => {
    if (e.key === "Enter") {
      const line = inp.value;
      print(`${prom.textContent} ${line}`);
      inp.value = "";
      if (line.trim()) {
        history.push(line);
        hIdx = history.length;
        await run(line.trim());
      }
      setPrompt();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (history.length === 0) return;
      hIdx = Math.max(0, hIdx - 1);
      inp.value = history[hIdx] || "";
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      hIdx = Math.min(history.length, hIdx + 1);
      inp.value = history[hIdx] || "";
    } else if (e.key === "l" && e.ctrlKey) {
      e.preventDefault();
      out.innerHTML = "";
    }
  });
  async function run(line) {
    const parts = tokenize(line);
    const cmd = parts[0];
    const args = parts.slice(1);
    const handler = COMMANDS[cmd];
    if (!handler) {
      err(`blizzard: command not found: ${cmd}`);
      return;
    }
    try {
      await handler(args, { print, ok, err, dim, warn, abs, getCwd: () => cwd, setCwd: (p) => {
        cwd = p;
      }, ctx });
    } catch (e) {
      err(String(e?.message || e));
    }
  }
}
function tokenize(line) {
  const out = [];
  let cur = "", q = null;
  for (const c of line) {
    if (q) {
      if (c === q) {
        q = null;
      } else cur += c;
    } else if (c === '"' || c === "'") {
      q = c;
    } else if (c === " " || c === "	") {
      if (cur) {
        out.push(cur);
        cur = "";
      }
    } else {
      cur += c;
    }
  }
  if (cur) out.push(cur);
  return out;
}

      }

async function fetchTree(spec, branch) {
  const url = `https://api.github.com/repos/${spec}/git/trees/${branch}?recursive=1`;
  const res = await fetch(url);
  if (!res.ok) return null;
  return res.json();
}

      gain.gain.setValueAtTime(0, when);
      gain.gain.linearRampToValueAtTime(0.18, when + 0.02);
      gain.gain.linearRampToValueAtTime(0, when + 0.5);
      osc.connect(gain).connect(ringCtx.destination);
      osc.start(when);
      osc.stop(when + 0.55);
    };
